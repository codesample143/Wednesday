syntax = "proto3"; 

package wednesday; 

message BlockReadRequest {
  string file_path = 1;  
  int64 offset = 2;     
  int32 block_size = 3; 
}

message BlockReadResponse {
  bytes data = 1;        
  int32 bytes_read = 2; 
  bool success = 3;      
}

message NodeInfo {
  string node_id = 1;
  string ip_address = 2;
  int32 port = 3;
}

message NodeResponse {
  NodeInfo successor = 1;
}

message NotifyResponse {
  bool success = 1;
}

message BlockWriteRequest {
  string file_path = 1;
  int64 offset = 2;
  bytes data = 3;        
}

message BlockWriteResponse {
  int32 bytes_written = 1;
  bool success = 2;
}

service StorageNodeService {
  rpc ReadBlock (BlockReadRequest) returns (BlockReadResponse);
  rpc JoinNetwork (NodeInfo) returns (NodeResponse);
  rpc NotifyNode (NodeInfo) returns (NotifyResponse);
  rpc WriteBlock (BlockWriteRequest) returns (BlockWriteResponse);
}

